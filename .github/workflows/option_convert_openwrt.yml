#CI权限
permissions: write-all

#CI任务
jobs:
  owrt_config:
    #调用公用编译核心OWRT-CORE.yml
    uses: ./.github/workflows/OWRT-CORE-ophub.yml
    with:
      #编译平台，X64包含X86,arm
      OWRT_TARGET: ${{ github.event.inputs.openwrt_board }}
      #默认主题
      OWRT_THEME: argon
      #默认主机名
      OWRT_NAME: openwrt
      #默认密码，仅作展示，更改无效
      OWRT_PW: password
      #默认地址
      OWRT_IP: 192.168.1.100
      #默认源码
      OWRT_URL: https://github.com/immortalwrt/immortalwrt
      #源码版本
      OWRT_BRANCH: master
      #自定义config
      OWRT_CFG: armsr.config
      #设备类型
      OWRT_TYPE: 通用
      OWRT_LINUX: ${{ github.event.inputs.openwrt_kernel_select }}
      OWRT_FILES: N1/files
      DIY_P1_SH: N1.sh
      DIY_P2_SH: Settings.sh
      #save/temp
      OWRT_STORAGE: save
      kernel_repo: ophub/kernel
      #stable/flippy/dev/beta
      kernel_usage: ${{ github.event.inputs.kernel_usage_select }}
      builder_name: ophub
      auto_kernel: true