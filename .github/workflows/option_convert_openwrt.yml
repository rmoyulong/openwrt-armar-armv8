        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - beta
      openwrt_kernel_select:
        description: "选择内核版本"
        required: false
        default: "6.1.y_6.6.y"
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
          - 5.10.y_5.15.y
